<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ItsMeeChiara</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Poppins', sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

/* BACKGROUND */
.hero{
    height:100vh;
    width:100%;
    background: radial-gradient(circle at 30% 50%, rgba(255,180,80,0.2), transparent 60%),
                radial-gradient(circle at 70% 40%, rgba(255,200,120,0.15), transparent 60%),
                black;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 8%;
}

/* TEXT */
.content{
    max-width:500px;
}

h1{
    font-family:'Playfair Display', serif;
    font-size:70px;
    color:#f5c27a;
}

h1 span{
    font-style:italic;
}

.tagline{
    margin-top:15px;
    font-size:18px;
    opacity:0.8;
}

.buttons{
    margin-top:30px;
}

button{
    padding:12px 25px;
    margin-right:10px;
    border-radius:30px;
    border:1px solid #f5c27a;
    background:transparent;
    color:#f5c27a;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#f5c27a;
    color:black;
}

/* IMAGE */
.image img{
    height:85vh;
    object-fit:contain;
    filter:drop-shadow(0 0 40px rgba(255,200,100,0.3));
}

/* NAV */
nav{
    position:absolute;
    top:20px;
    right:40px;
}

nav a{
    margin-left:20px;
    color:white;
    text-decoration:none;
    font-size:14px;
    opacity:0.7;
}

nav a:hover{
    opacity:1;
}
</style>

</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">My World</a>
    <a href="#">Private Access</a>
</nav>

<div class="hero">

    <div class="content">
        <h1>ItsMee<span>Chiara</span></h1>

        <p class="tagline">
            Private. Exclusive. Different.
        </p>

        <div class="buttons">
            <button onclick="window.location.href='#'">Enter my world</button>
            <button onclick="window.location.href='#'">Follow me</button>
        </div>
    </div>

    <div class="image">
        <img src="chiara.png" alt="Chiara">
    </div>

</div>

</body>
</html>
