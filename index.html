<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ItsMeeChiara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --gold:#efbf83;
      --gold-soft:#f6d2a5;
      --line:rgba(239,191,131,.55);
      --text:#f6e3cb;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#000}
    body{
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:#000;
    }
    .hero{
      position:relative;
      min-height:100vh;
      background:
        linear-gradient(90deg, rgba(5,4,4,.14) 0%, rgba(5,4,4,.06) 34%, rgba(5,4,4,.02) 100%),
        url("hero-background.png") center center / cover no-repeat;
      isolation:isolate;
    }
    .topbar{
      position:absolute;
      top:26px;
      left:0;
      right:0;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 46px;
    }
    .logo{
      font-family:"Cormorant Garamond", serif;
      color:var(--gold);
      font-size:62px;
      font-weight:700;
      line-height:1;
      letter-spacing:-2px;
      text-decoration:none;
      text-shadow:0 0 20px rgba(239,191,131,.16);
    }
    .nav{
      display:flex;
      align-items:center;
      gap:24px;
      font-size:13px;
      font-weight:500;
    }
    .nav a{
      color:#f1d9bb;
      text-decoration:none;
      position:relative;
      opacity:.95;
    }
    .nav a.active::after{
      content:"";
      position:absolute;
      left:0; right:0; bottom:-6px;
      height:1px;
      background:var(--gold);
      box-shadow:0 0 12px rgba(239,191,131,.25);
    }
    .nav .icon{
      font-size:18px;
      line-height:1;
      transform:translateY(-1px);
    }
    .overlay{
      position:relative;
      z-index:2;
      min-height:100vh;
      display:flex;
      align-items:center;
      padding:120px 44px 56px;
    }
    .content{
      width:min(54vw, 760px);
      padding-left:56px;
    }
    h1{
      margin:0;
      font-family:"Cormorant Garamond", serif;
      font-size:clamp(68px, 7.8vw, 116px);
      line-height:.92;
      font-weight:500;
      letter-spacing:-2px;
      color:var(--gold);
      text-shadow:0 0 26px rgba(239,191,131,.14);
    }
    h1 .accent{
      font-style:italic;
      font-weight:500;
    }
    .tagline{
      margin-top:22px;
      font-family:"Cormorant Garamond", serif;
      font-size:clamp(28px, 2.5vw, 46px);
      color:#f4e0c8;
      letter-spacing:.2px;
      text-shadow:0 0 18px rgba(0,0,0,.18);
    }
    .buttons{
      display:flex;
      gap:22px;
      flex-wrap:wrap;
      margin-top:40px;
    }
    .btn{
      position:relative;
      min-width:188px;
      padding:15px 30px;
      border-radius:999px;
      border:1px solid var(--line);
      text-decoration:none;
      color:var(--gold);
      font-size:15px;
      font-weight:500;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(15,10,7,.16);
      backdrop-filter:blur(3px);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.02),
        0 0 18px rgba(239,191,131,.08);
      overflow:hidden;
    }
    .btn::before{
      content:"";
      position:absolute;
      top:-60%;
      bottom:-60%;
      left:-130%;
      width:48%;
      transform:skewX(-28deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
      animation:shine 4.6s infinite;
    }
    .btn:nth-child(2)::before{ animation-delay:1.15s; }
    @keyframes shine{
      0%{ left:-130%; }
      24%{ left:150%; }
      100%{ left:150%; }
    }
    .social{
      display:flex;
      align-items:center;
      gap:18px;
      margin-top:28px;
      padding-left:10px;
    }
    .social a{
      display:inline-flex;
      width:38px;
      height:38px;
      align-items:center;
      justify-content:center;
      color:var(--gold-soft);
      text-decoration:none;
      filter:drop-shadow(0 0 12px rgba(239,191,131,.12));
    }
    .social svg{
      width:31px;
      height:31px;
      display:block;
    }
    @media (max-width: 1050px){
      .overlay{align-items:flex-end;padding:120px 24px 36px}
      .content{width:min(70vw, 680px);padding-left:14px}
      .topbar{padding:0 20px}
      .nav{gap:14px;font-size:12px}
    }
    @media (max-width: 720px){
      .hero{
        background-position: 63% center;
        min-height:100svh;
      }
      .topbar{
        top:14px;
        padding:0 16px;
      }
      .logo{font-size:48px}
      .nav{display:none}
      .overlay{
        min-height:100svh;
        align-items:flex-end;
        padding:92px 16px 28px;
      }
      .content{
        width:100%;
        padding-left:0;
      }
      h1{font-size:58px}
      .tagline{font-size:22px}
      .buttons{gap:14px;margin-top:28px}
      .btn{width:100%;min-width:unset}
      .social{margin-top:18px;padding-left:4px}
    }
  </style>
</head>
<body>
  <section class="hero">
    <header class="topbar">
      <a href="#" class="logo" aria-label="Logo">∞.</a>
      <nav class="nav" aria-label="Navigation">
        <a href="#" class="active">Home</a>
        <a href="#">About</a>
        <a href="#">My World</a>
        <a href="#">Private Access</a>
        <a href="#" class="icon" aria-label="Menü">≡</a>
        <a href="#" class="icon" aria-label="Suche">⌕</a>
      </nav>
    </header>

    <div class="overlay">
      <div class="content">
        <h1>ItsMee<span class="accent">Chiara</span></h1>
        <div class="tagline">Private. Exclusive. Different.</div>

        <div class="buttons">
          <a class="btn" href="#">Enter my world</a>
          <a class="btn" href="#">Tellow me</a>
        </div>

        <div class="social" aria-label="Social Media">
          <a href="#" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3.2" y="3.2" width="17.6" height="17.6" rx="5"></rect>
              <circle cx="12" cy="12" r="4.2"></circle>
              <circle cx="17.3" cy="6.8" r="1"></circle>
            </svg>
          </a>
          <a href="#" aria-label="Telegram">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M21.4 4.6 18.2 19c-.24 1.02-.88 1.28-1.78.8l-4.92-3.63-2.37 2.28c-.26.26-.48.48-.98.48l.35-4.98 9.07-8.2c.4-.35-.08-.55-.6-.2l-11.2 7.05-4.82-1.5c-1.05-.33-1.06-1.05.22-1.55L19.53 3.5c.85-.32 1.6.2 1.87 1.1Z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
