<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ItsMeeChiara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --gold: #efbf83;
      --gold-soft: #f6d2a5;
      --line: rgba(239, 191, 131, .55);
      --text: #f6e3cb;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #000
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: #000;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(5, 4, 4, .18) 0%, rgba(5, 4, 4, .08) 34%, rgba(5, 4, 4, .03) 100%),
        url("hero-background.png") 64% center / cover no-repeat;
      isolation: isolate;
    }

    .topbar {
      position: absolute;
      top: 26px;
      left: 0;
      right: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 46px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      line-height: 0;
    }

    .logo img {
      width: 128px;
      height: auto;
      display: block;
      background: transparent;
      mix-blend-mode: darken;
      filter: drop-shadow(0 0 16px rgba(239, 191, 131, .18));
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 13px;
      font-weight: 500;
    }

    .nav a {
      color: #f1d9bb;
      text-decoration: none;
      position: relative;
      opacity: 0.75;
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    .nav a:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    /* Aktiver Link bleibt wie er ist, nur minimal schöner */
    .nav a.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -6px;
      height: 1px;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(239, 191, 131, 0.4);
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -6px;
      height: 1px;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(239, 191, 131, .25);
    }

    .nav .icon {
      font-size: 18px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .overlay {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 120px 44px 56px;
    }

    .content {
      width: min(46vw, 640px);
      padding-left: 38px;
      margin-left: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .brand-title {
      margin: 0;
      line-height: 0;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .brand-title img {
      width: min(100%, 760px);
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 0 24px rgba(239, 191, 131, .10));
    }

    .tagline {
      margin-top: 20px;
      margin-bottom: 28px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(28px, 2.35vw, 42px);
      color: #f4e0c8;
      letter-spacing: .2px;
      text-shadow: 0 0 18px rgba(0, 0, 0, .18);
      width: 100%;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
      margin-top: 0px;
      margin-bottom: 32px;
      justify-content: center;
      width: 100%;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 999px;
      border: 1px solid rgba(239, 191, 131, 0.6);
      color: #efbf83;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;

      background: rgba(15, 10, 7, 0.25);
      backdrop-filter: blur(6px);

      position: relative;
      overflow: hidden;

      box-shadow:
        0 0 12px rgba(239, 191, 131, 0.15),
        inset 0 0 8px rgba(239, 191, 131, 0.05);

      transition: all 0.3s ease;
    }

    /* Hover = Premium Glow */
    .btn:hover {
      color: #ffdca8;
      border-color: rgba(255, 220, 168, 0.9);

      box-shadow:
        0 0 25px rgba(239, 191, 131, 0.35),
        0 0 60px rgba(239, 191, 131, 0.15);

      transform: translateY(-2px) scale(1.03);
    }

    /* Soft moving glow inside */
    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 120%;
      height: 100%;

      background: linear-gradient(120deg,
          transparent,
          rgba(255, 255, 255, 0.25),
          transparent);

      transition: 0.6s;
    }

    .btn:hover::before {
      left: 120%;
    }

    @keyframes glowPulse {
      0% {
        box-shadow: 0 0 10px rgba(239, 191, 131, 0.15);
      }

      50% {
        box-shadow:
          0 0 40px rgba(239, 191, 131, 0.45),
          0 0 80px rgba(239, 191, 131, 0.2);
      }

      100% {
        box-shadow: 0 0 10px rgba(239, 191, 131, 0.15);
      }
    }

    .btn {
      animation: glowPulse 8s ease-in-out infinite;
    }

    .social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 0px;
      width: 100%;
      padding-left: 0;
    }

    .social a {
      display: inline-flex;
      width: 30px;
      height: 30px;
      align-items: center;
      justify-content: center;
      color: rgba(255, 232, 205, 0.82);
      text-decoration: none;
      opacity: 0.82;
      filter: drop-shadow(0 0 7px rgba(239, 191, 131, 0.18));
      transition: opacity 0.3s ease, transform 0.3s ease, filter 0.3s ease;
    }

    .social svg {
      width: 25px;
      height: 25px;
      display: block;
    }

    .social a:hover {
      opacity: 1;
      transform: translateY(-2px) scale(1.08);
      filter: drop-shadow(0 0 9px rgba(239, 191, 131, 0.65));
    }


    .footer {
      margin-top: 24px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: #f1d9bb;
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      opacity: 0.55;
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    .footer-links a:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    @media (max-width: 1050px) {
      .overlay {
        align-items: flex-end;
        padding: 120px 24px 36px
      }

      .content {
        width: min(64vw, 620px);
        padding-left: 10px;
        margin-left: 0
      }

      .topbar {
        padding: 0 20px
      }

      .nav {
        gap: 14px;
        font-size: 12px
      }

      .hero {
        background-position: 68% center;
      }

      .brand-title img {
        width: min(100%, 620px);
      }
    }

    @media (max-width: 720px) {
      .hero {
        background-position: 72% center;
        min-height: 100svh;
      }

      .topbar {
        top: 14px;
        padding: 0 16px;
      }

      .logo img {
        width: 54px
      }

      .nav {
        display: none
      }

      .overlay {
        min-height: 100svh;
        align-items: flex-end;
        padding: 92px 16px 28px;
      }

      .content {
        width: 100%;
        padding-left: 0;
        margin-left: 0;
      }

      .brand-title img {
        width: min(100%, 520px);
      }

      .tagline {
        font-size: 21px
      }

      .buttons {
        gap: 14px;
        margin-top: 28px
      }

      .btn {
        width: 100%;
        min-width: unset
      }

      .social {
        margin-top: 18px
      }

      .footer {
        margin-top: 18px;
      }

      .footer-links {
        gap: 12px;
      }

      .footer-links a {
        font-size: 10px;
      }
    }

    #ageGate {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 4, 4, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .age-box {
      text-align: center;
      color: var(--text);
    }

    .age-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }
  </style>
</head>
